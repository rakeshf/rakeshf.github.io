{{ define "main" }}
      <!--Grid row-->
      <div class="row">
        <h1>{{ .Title }}</h1>
        <!--Grid column-->
        <div class="col-md-8 mb-4">
          <!--Section: Post data-mdb-->
          <section class="border-bottom mb-4">
            {{ with .Page.Params.image }}
            <figure>
                {{ $image := $.Page.Resources.GetMatch . }}
                <img id="cover-image" src={{ $image.RelPermalink }} alt="{{ $.Title }}"
              class="img-fluid shadow-2-strong rounded-5 mb-4" />
            </figure>
            {{ end }}
            <div class="row align-items-center mb-4">
              <div class="col-lg-6 text-center text-lg-start mb-3 m-lg-0">
                <span> Published <u>{{ partial "date.html" .Date }}</u> &centerdot;{{ partial "time-to-read.html" .}}</span>
              </div>
            </div>
          </section>
          <!--Section: Post data-mdb-->
  
          <!--Section: Text-->
          <section>
            {{ .Content }}
          </section>
          <!--Section: Text-->
  
          <!--Section: Share buttons-->
          <section class="text-center border-top border-bottom py-4 mb-4">
            {{ partial "social-media-share.html" . }}
          </section>
        </div>
        <!--Grid column-->
        <!--Grid column-->
        <div class="col-md-4 mb-4">
          <!--Section: Sidebar-->
          <section class="sticky-top" style="top: 80px;">
            <!--Section: Ad-->
            <section class="text-center border-bottom pb-4 mb-4">
              <iframe src="//rcm-na.amazon-adsystem.com/e/cm?o=1&p=22&l=ur1&category=beauty&banner=04XCSE6T0AFM7MK75482&f=ifr&linkID=497679265bee8e383aafe4db341c613c&t=luciferdigita-20&tracking_id=luciferdigita-20" width="250" height="250" scrolling="no" border="0" marginwidth="0" style="border:none;" frameborder="0" sandbox="allow-scripts allow-same-origin allow-popups allow-top-navigation-by-user-activation"></iframe>
            </section>
            <!--Section: Ad-->
            <!--Section: Video-->
            <section class="text-center">
              <iframe src="//rcm-na.amazon-adsystem.com/e/cm?o=1&p=22&l=ur1&category=beauty&banner=07K382C5YNG1DBEEZ4R2&f=ifr&linkID=2727e77e5eadc4c70a666a374bf18cd3&t=luciferdigita-20&tracking_id=luciferdigita-20" width="250" height="250" scrolling="no" border="0" marginwidth="0" style="border:none;" frameborder="0" sandbox="allow-scripts allow-same-origin allow-popups allow-top-navigation-by-user-activation"></iframe>
            </section>
            <!--Section: Video-->
          </section>
          <!--Section: Sidebar-->
        </div>
        <!--Grid column-->
      </div>
      <!--Grid row-->
{{ end }}
