{{ define "main" }}
<!--Main layout-->
<main class="mt-4 mb-5">
    <div class="container">
        <section>
      <!--Grid row-->
      <div class="row">
            {{ $paginator := .Paginate (where .Pages "Type" "posts") 9 }}
            <div class="row gx-5">
                {{ range $paginator.Pages }}
                    {{ partial "suggestion.html" . }}
                {{ end }}
            </div>
            <nav class="my-4" aria-label="...">
                {{ template "_internal/pagination.html" . }}
            </nav>    
      </div>
        </section>
      <!--Grid row-->
    </div>
  </main>
  <!--Main layout-->
{{ end }}
